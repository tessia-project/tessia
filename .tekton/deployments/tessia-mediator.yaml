kind: Deployment
apiVersion: apps/v1
metadata:
  name: tessia-mediator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tessia-mediator
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: tessia-mediator
    spec:
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
      containers:
        - resources: {}
          terminationMessagePath: /dev/termination-log
          name: redis
          ports:
            - containerPort: 6379
              protocol: TCP
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: redis-data
              mountPath: /data
          terminationMessagePolicy: File
          image: 'redis:7-alpine'
          args:
            - '--save'
            - '900'
            - '1'
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

